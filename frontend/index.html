<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>核心概念卡片</title>
<style>
/* ====== CSS 变量：浅色/深色模式 ====== */
:root {
  --bg:        #f5f5f7;
  --card-bg:   #ffffff;
  --text:      #1d1d1f;
  --text-sub:  #6e6e73;
  --border:    #e5e5ea;
  --shadow:    0 2px 12px rgba(0, 0, 0, 0.06);
  --tag-bg:    #f0f0f5;
  --tag-text:  #0071e3;
  --accent:    #0071e3;
  --divider:   #e5e5ea;
  --error-bg:  #fff0f0;
  --error-text:#c0392b;
}

[data-theme="dark"] {
  --bg:        #1c1c1e;
  --card-bg:   #2c2c2e;
  --text:      #f5f5f7;
  --text-sub:  #98989d;
  --border:    #3a3a3c;
  --shadow:    0 2px 12px rgba(0, 0, 0, 0.3);
  --tag-bg:    #3a3a3c;
  --tag-text:  #64d2ff;
  --accent:    #64d2ff;
  --divider:   #3a3a3c;
  --error-bg:  #3a1a1a;
  --error-text:#ff6b6b;
}

/* ====== 基础重置 ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
               "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
}

/* ====== 容器 ====== */
.header {
  max-width: 700px;
  margin: 0 auto;
  padding: 36px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 24px;
}

/* ====== 深色/浅色切换按钮 ====== */
.theme-toggle {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, border-color 0.3s, transform 0.2s;
  line-height: 1;
}
.theme-toggle:hover { transform: scale(1.08); }
.theme-toggle:active { transform: scale(0.95); }

/* ====== 分区标题 ====== */
.section {
  margin-bottom: 32px;
}

.section-title {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-sub);
  margin-bottom: 14px;
  padding-left: 2px;
}

/* ====== 卡片列表（单列） ====== */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 30px 28px;
  display: flex;
  align-items: flex-start;
  gap: 20px;
  transition: transform 0.2s, box-shadow 0.2s, background 0.3s, border-color 0.3s;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}

/* 卡片左侧装饰色条 */
.card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 20px;
  bottom: 20px;
  width: 4px;
  border-radius: 0 99px 99px 0;
  background: var(--accent);
  opacity: 0.3;
  transition: opacity 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.1);
}

.card:hover::before {
  opacity: 0.7;
}

/* 序号圆圈 */
.card-index {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--tag-bg);
  color: var(--tag-text);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-top: 0;
}

/* 卡片文字区 */
.card-body {
  flex: 1;
  min-width: 0;
}

.card-name {
  font-size: 1.08rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
  letter-spacing: -0.01em;
}

.card-explanation {
  font-size: 0.9rem;
  color: var(--text-sub);
  line-height: 1.6;
}

/* ====== 加载 & 错误状态 ====== */
.state-message {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-sub);
}

.state-message .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: var(--error-bg);
  color: var(--error-text);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  max-width: 480px;
  margin: 40px auto;
}

.error-box .error-icon {
  font-size: 2rem;
  margin-bottom: 12px;
}

.error-box p { margin-bottom: 8px; }

.error-box code {
  background: rgba(0,0,0,0.08);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.85rem;
}

/* ====== 底部 ====== */
.footer {
  text-align: center;
  padding: 16px 24px 40px;
  font-size: 0.78rem;
  color: var(--text-sub);
  opacity: 0.6;
}

/* ====== 响应式 ====== */
@media (max-width: 640px) {
  .header h1 { font-size: 1.25rem; }
  .container { padding: 16px; }
  .card {
    padding: 24px 20px;
    border-radius: 22px;
    gap: 16px;
  }
}
</style>
</head>
<body>

<!-- 顶部：标题 + 模式切换 -->
<div class="header">
  <h1>核心概念</h1>
  <button class="theme-toggle" id="themeToggle" aria-label="切换深色/浅色模式" title="切换深色/浅色模式">☀</button>
</div>

<!-- 主内容区 -->
<div class="container" id="content">
  <div class="state-message">
    <div class="spinner"></div>
    <p>正在加载数据...</p>
  </div>
</div>

<!-- 底部 -->
<div class="footer">数据来源 · DeepSeek V4 Flash 生成</div>

<script>
(function () {
  'use strict';

  var contentEl = document.getElementById('content');
  var toggleBtn = document.getElementById('themeToggle');
  var htmlEl    = document.documentElement;

  // ====== 深色/浅色模式 ======

  function getInitialTheme() {
    var stored = localStorage.getItem('theme');
    if (stored === 'dark' || stored === 'light') return stored;
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
    return 'light';
  }

  function applyTheme(theme) {
    htmlEl.setAttribute('data-theme', theme);
    toggleBtn.textContent = theme === 'dark' ? '☽' : '☀';
    localStorage.setItem('theme', theme);
  }

  function toggleTheme() {
    var current = htmlEl.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }

  applyTheme(getInitialTheme());
  toggleBtn.addEventListener('click', toggleTheme);

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
    if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
  });

  // ====== 数据加载 & 渲染 ======

  async function loadAndRender() {
    try {
      var response = await fetch('concepts.json');
      if (!response.ok) throw new Error('HTTP ' + response.status + ': ' + response.statusText);
      var data = await response.json();
      if (!data.ai_concepts || !data.programming_concepts) {
        throw new Error('数据格式不正确：缺少 ai_concepts 或 programming_concepts 字段');
      }
      render(data);
    } catch (err) {
      renderError(err);
    }
  }

  function render(data) {
    var sections = [
      { title: '人工智能', key: 'ai_concepts' },
      { title: '编程',     key: 'programming_concepts' }
    ];

    var html = '';

    for (var s = 0; s < sections.length; s++) {
      var sec = sections[s];
      var concepts = data[sec.key];
      html += '<div class="section">';
      html += '<div class="section-title">' + sec.title + '</div>';
      html += '<div class="card-list">';

      for (var i = 0; i < concepts.length; i++) {
        var item = concepts[i];
        html +=
          '<div class="card">' +
            '<div class="card-index">' + (i + 1) + '</div>' +
            '<div class="card-body">' +
              '<div class="card-name">' + escapeHTML(item.name) + '</div>' +
              '<div class="card-explanation">' + escapeHTML(item.explanation) + '</div>' +
            '</div>' +
          '</div>';
      }

      html += '</div></div>';
    }

    contentEl.innerHTML = html;
  }

  function renderError(err) {
    var isFile = window.location.protocol === 'file:';
    var tip = '';

    if (isFile) {
      tip =
        '<p style="margin-top:16px;font-size:0.85rem;">' +
          '提示：如果你是用浏览器直接打开了这个 HTML 文件（file:// 协议），' +
          'fetch 可能被浏览器安全策略阻止。<br>' +
          '请在终端执行以下命令启动本地服务器后再访问：' +
        '</p>' +
        '<p style="margin-top:8px;"><code>cd frontend && python -m http.server 8000</code></p>' +
        '<p style="margin-top:4px;font-size:0.85rem;">然后打开 <code>http://localhost:8000</code></p>';
    }

    contentEl.innerHTML =
      '<div class="error-box">' +
        '<div class="error-icon">!</div>' +
        '<p><strong>数据加载失败</strong></p>' +
        '<p style="font-size:0.85rem;">' + escapeHTML(err.message) + '</p>' +
        tip +
      '</div>';
  }

  function escapeHTML(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  loadAndRender();
})();
</script>

</body>
</html>
