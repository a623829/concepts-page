<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1c1c1e" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<title>核心概念卡片</title>
<style>
/* ====== CSS 变量：浅色/深色模式 ====== */
:root {
  --bg:        #f5f5f7;
  --card-bg:   #ffffff;
  --text:      #1d1d1f;
  --text-sub:  #6e6e73;
  --border:    #e5e5ea;
  --shadow:    0 2px 12px rgba(0, 0, 0, 0.06);
  --tag-bg:    #f0f0f5;
  --tag-text:  #0071e3;
  --accent:    #0071e3;
  --accent-hover: #0066cc;
  --divider:   #e5e5ea;
  --error-bg:  #fff0f0;
  --error-text:#c0392b;
  --toast-bg:  rgba(0,0,0,0.82);
  --toast-text:#fff;
  --overlay-bg:rgba(0,0,0,0.4);
  --fab-shadow: 0 4px 20px rgba(0,113,227,0.35);
  --safe-bottom: env(safe-area-inset-bottom, 16px);
  --safe-left:  env(safe-area-inset-left, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
}

[data-theme="dark"] {
  --bg:        #1c1c1e;
  --card-bg:   #2c2c2e;
  --text:      #f5f5f7;
  --text-sub:  #98989d;
  --border:    #3a3a3c;
  --shadow:    0 2px 12px rgba(0, 0, 0, 0.3);
  --tag-bg:    #3a3a3c;
  --tag-text:  #64d2ff;
  --accent:    #64d2ff;
  --accent-hover: #4dc4f0;
  --divider:   #3a3a3c;
  --error-bg:  #3a1a1a;
  --error-text:#ff6b6b;
  --toast-bg:  rgba(255,255,255,0.88);
  --toast-text:#1c1c1e;
  --overlay-bg:rgba(0,0,0,0.55);
  --fab-shadow: 0 4px 20px rgba(100,210,255,0.3);
}

/* ====== 基础重置 ====== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
               "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
  min-height: 100vh;
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ====== 容器 ====== */
.header {
  max-width: 700px;
  margin: 0 auto;
  padding: 36px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: -0.02em;
}

.container {
  max-width: 700px;
  margin: 0 auto;
  padding: 24px;
  padding-bottom: 100px;
}

/* ====== 深色/浅色切换按钮 ====== */
.theme-toggle {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: var(--card-bg);
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.3s, border-color 0.3s, transform 0.2s;
  line-height: 1;
  -webkit-user-select: none;
  user-select: none;
}
.theme-toggle:hover { transform: scale(1.08); }
.theme-toggle:active { transform: scale(0.92); }

/* ====== 分区标题 ====== */
.section {
  margin-bottom: 32px;
  animation: fadeUp 0.4s ease both;
}
.section:nth-child(2) { animation-delay: 0.08s; }
.section:nth-child(3) { animation-delay: 0.16s; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.section-title {
  font-size: 0.78rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-sub);
  margin-bottom: 14px;
  padding-left: 2px;
}

/* ====== 卡片列表（单列） ====== */
.card-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 30px 28px;
  display: flex;
  align-items: flex-start;
  gap: 20px;
  transition: transform 0.2s, box-shadow 0.2s, background 0.3s, border-color 0.3s;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
  -webkit-user-select: none;
  user-select: none;
}

/* 卡片左侧装饰色条 */
.card::before {
  content: '';
  position: absolute;
  left: 0;
  top: 20px;
  bottom: 20px;
  width: 4px;
  border-radius: 0 99px 99px 0;
  background: var(--accent);
  opacity: 0.3;
  transition: opacity 0.2s;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 28px rgba(0, 0, 0, 0.1);
}

.card:active {
  transform: translateY(0);
}

.card:hover::before {
  opacity: 0.7;
}

/* 序号圆圈 */
.card-index {
  flex-shrink: 0;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--tag-bg);
  color: var(--tag-text);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.02em;
  margin-top: 0;
}

/* 卡片文字区 */
.card-body {
  flex: 1;
  min-width: 0;
}

.card-name {
  font-size: 1.08rem;
  font-weight: 700;
  margin-bottom: 8px;
  color: var(--text);
  letter-spacing: -0.01em;
}

.card-explanation {
  font-size: 0.9rem;
  color: var(--text-sub);
  line-height: 1.6;
}

/* ====== 加载 & 错误状态 ====== */
.state-message {
  text-align: center;
  padding: 60px 24px;
  color: var(--text-sub);
}

.state-message .spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-box {
  background: var(--error-bg);
  color: var(--error-text);
  border-radius: 20px;
  padding: 32px 24px;
  text-align: center;
  max-width: 480px;
  margin: 40px auto;
}

.error-box .error-icon {
  font-size: 2rem;
  margin-bottom: 12px;
}

.error-box p { margin-bottom: 8px; }

.error-box code {
  background: rgba(0,0,0,0.08);
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 0.85rem;
}

/* ====== 底部 ====== */
.footer {
  text-align: center;
  padding: 16px 24px 40px;
  padding-bottom: calc(40px + var(--safe-bottom));
  font-size: 0.78rem;
  color: var(--text-sub);
  opacity: 0.6;
}

/* ====== 悬浮刷新按钮（FAB）====== */
.fab {
  position: fixed;
  bottom: calc(24px + var(--safe-bottom));
  right: calc(24px + var(--safe-right));
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: var(--fab-shadow);
  transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
              background 0.25s,
              opacity 0.3s;
  z-index: 100;
  -webkit-user-select: none;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

.fab:hover {
  transform: scale(1.08);
  background: var(--accent-hover);
}

.fab:active {
  transform: scale(0.92);
}

.fab svg {
  width: 26px;
  height: 26px;
  fill: #fff;
  transition: transform 0.3s;
}

.fab.spinning svg {
  animation: fabSpin 0.8s linear infinite;
}

@keyframes fabSpin {
  to { transform: rotate(360deg); }
}

/* ====== Toast 通知 ====== */
.toast-container {
  position: fixed;
  bottom: calc(96px + var(--safe-bottom));
  left: 50%;
  transform: translateX(-50%);
  z-index: 200;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.toast {
  background: var(--toast-bg);
  color: var(--toast-text);
  padding: 12px 24px;
  border-radius: 14px;
  font-size: 0.88rem;
  font-weight: 500;
  box-shadow: 0 4px 24px rgba(0,0,0,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  animation: toastIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  pointer-events: auto;
  max-width: 340px;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.toast.out {
  animation: toastOut 0.3s ease both;
}

@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px) scale(0.9); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes toastOut {
  from { opacity: 1; transform: translateY(0) scale(1); }
  to   { opacity: 0; transform: translateY(-10px) scale(0.9); }
}

/* ====== 设置弹窗 ====== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 300;
  animation: overlayIn 0.25s ease both;
  padding: 24px;
}

@keyframes overlayIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}

.modal {
  background: var(--card-bg);
  border-radius: 28px;
  padding: 32px 28px 24px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 16px 48px rgba(0,0,0,0.2);
  animation: modalIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
}

@keyframes modalIn {
  from { opacity: 0; transform: translateY(30px) scale(0.92); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

.modal h2 {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 6px;
  letter-spacing: -0.01em;
}

.modal .modal-sub {
  font-size: 0.82rem;
  color: var(--text-sub);
  margin-bottom: 20px;
  line-height: 1.5;
}

.modal label {
  display: block;
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text-sub);
  margin-bottom: 6px;
  margin-top: 14px;
}

.modal label:first-of-type {
  margin-top: 0;
}

.modal input {
  width: 100%;
  padding: 13px 16px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  font-size: 0.88rem;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
  font-family: inherit;
}

.modal input:focus {
  border-color: var(--accent);
}

.modal input::placeholder {
  color: var(--text-sub);
  opacity: 0.5;
}

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 22px;
}

.modal-actions button {
  flex: 1;
  padding: 13px;
  border-radius: 14px;
  font-size: 0.92rem;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: transform 0.2s, opacity 0.2s;
  font-family: inherit;
}

.modal-actions button:active {
  transform: scale(0.96);
}

.btn-cancel {
  background: var(--tag-bg);
  color: var(--text);
}

.btn-confirm {
  background: var(--accent);
  color: #fff;
}

.btn-confirm:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ====== 下拉刷新指示器 ====== */
.pull-indicator {
  position: fixed;
  top: -60px;
  left: 0;
  right: 0;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 50;
  color: var(--text-sub);
  font-size: 0.82rem;
  font-weight: 500;
  transition: top 0.3s;
  pointer-events: none;
}

.pull-indicator.visible {
  top: 0;
}

.pull-indicator .arrow {
  display: inline-block;
  margin-right: 8px;
  transition: transform 0.2s;
  font-size: 1.1rem;
}

.pull-indicator .arrow.flip {
  transform: rotate(180deg);
}

.pull-spinner {
  width: 20px;
  height: 20px;
  border: 2.5px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin-right: 10px;
  display: none;
}

.pull-indicator.loading .pull-spinner {
  display: inline-block;
}

.pull-indicator.loading .arrow {
  display: none;
}

/* ====== 响应式 ====== */
@media (max-width: 640px) {
  .header h1 { font-size: 1.25rem; }
  .header { padding: 28px 18px 0; }
  .container { padding: 18px; padding-bottom: 88px; }
  .card {
    padding: 24px 20px;
    border-radius: 22px;
    gap: 16px;
  }
  .fab {
    bottom: calc(20px + var(--safe-bottom));
    right: calc(20px + var(--safe-right));
    width: 52px;
    height: 52px;
  }
  .fab svg { width: 24px; height: 24px; }
  .modal { padding: 28px 18px 20px; }
}

@media (max-width: 400px) {
  .card { padding: 20px 16px; gap: 12px; }
  .card-index { width: 32px; height: 32px; font-size: 0.75rem; }
  .card-name { font-size: 1rem; }
  .card-explanation { font-size: 0.84rem; }
}

/* ====== 安全区域适配（刘海屏）====== */
@supports (padding: max(0px)) {
  .fab {
    bottom: max(24px, env(safe-area-inset-bottom, 24px));
    right: max(24px, env(safe-area-inset-right, 24px));
  }
  .footer {
    padding-bottom: max(40px, env(safe-area-inset-bottom, 40px));
  }
}

/* ====== 暗色模式滚动条美化 ====== */
[data-theme="dark"]::-webkit-scrollbar {
  width: 6px;
}
[data-theme="dark"]::-webkit-scrollbar-track {
  background: transparent;
}
[data-theme="dark"]::-webkit-scrollbar-thumb {
  background: #3a3a3c;
  border-radius: 3px;
}
</style>
</head>
<body>

<!-- 顶部：标题 + 模式切换 -->
<div class="header">
  <h1>核心概念</h1>
  <button class="theme-toggle" id="themeToggle" aria-label="切换深色/浅色模式" title="切换深色/浅色模式">☀</button>
</div>

<!-- 下拉刷新指示器 -->
<div class="pull-indicator" id="pullIndicator">
  <span class="arrow" id="pullArrow">↓</span>
  <span class="pull-spinner"></span>
  <span id="pullText">下拉刷新</span>
</div>

<!-- 主内容区 -->
<div class="container" id="content">
  <div class="state-message">
    <div class="spinner"></div>
    <p>正在加载数据...</p>
  </div>
</div>

<!-- 悬浮刷新按钮 -->
<button class="fab" id="fabBtn" aria-label="刷新数据" title="触发数据更新">
  <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.96 7.96 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</button>

<!-- Toast 容器 -->
<div class="toast-container" id="toastContainer"></div>

<!-- 设置弹窗（初始隐藏） -->
<div class="modal-overlay" id="settingsModal" style="display:none;">
  <div class="modal">
    <h2>设置</h2>
    <p class="modal-sub">配置 API 密钥，用于即时刷新数据</p>

    <label>DeepSeek API Key <span style="color:var(--error-text)">*</span></label>
    <input type="password" id="dsKeyInput" placeholder="sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx" autocomplete="off">

    <label>GitHub Token（可选，用于持久化）</label>
    <input type="password" id="ghTokenInput" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">

    <div class="modal-actions">
      <button class="btn-cancel" id="settingsCancel">取消</button>
      <button class="btn-confirm" id="settingsConfirm" disabled>保存</button>
    </div>
  </div>
</div>

<!-- 底部 -->
<div class="footer">数据来源 · DeepSeek V4 Flash 生成</div>

<script>
(function () {
  'use strict';

  // DOM 元素
  var contentEl    = document.getElementById('content');
  var toggleBtn    = document.getElementById('themeToggle');
  var htmlEl       = document.documentElement;
  var fabBtn       = document.getElementById('fabBtn');
  var toastCtn     = document.getElementById('toastContainer');
  var settingsModal= document.getElementById('settingsModal');
  var dsKeyInput   = document.getElementById('dsKeyInput');
  var ghTokenInput = document.getElementById('ghTokenInput');
  var settingsConf = document.getElementById('settingsConfirm');
  var settingsCanc = document.getElementById('settingsCancel');
  var pullInd      = document.getElementById('pullIndicator');
  var pullArrow    = document.getElementById('pullArrow');
  var pullText     = document.getElementById('pullText');

  // ====== 深色/浅色模式 ======

  function getInitialTheme() {
    var stored = localStorage.getItem('theme');
    if (stored === 'dark' || stored === 'light') return stored;
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) return 'dark';
    return 'light';
  }

  function applyTheme(theme) {
    htmlEl.setAttribute('data-theme', theme);
    toggleBtn.textContent = theme === 'dark' ? '☽' : '☀';
    localStorage.setItem('theme', theme);
    var meta = document.querySelector('meta[name="theme-color"]');
    if (meta) {
      meta.content = theme === 'dark' ? '#1c1c1e' : '#f5f5f7';
    }
  }

  function toggleTheme() {
    var current = htmlEl.getAttribute('data-theme') || 'light';
    applyTheme(current === 'dark' ? 'light' : 'dark');
  }

  applyTheme(getInitialTheme());
  toggleBtn.addEventListener('click', toggleTheme);

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
    if (!localStorage.getItem('theme')) applyTheme(e.matches ? 'dark' : 'light');
  });

  // ====== Toast 通知系统 ======

  function showToast(msg, type) {
    var el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    toastCtn.appendChild(el);

    setTimeout(function () {
      el.classList.add('out');
      setTimeout(function () { el.remove(); }, 300);
    }, 2800);
  }

  // ====== Keys 管理 ======

  function getDeepSeekKey() {
    return localStorage.getItem('ds_key') || '';
  }

  function getGitHubToken() {
    return localStorage.getItem('gh_token') || '';
  }

  // ====== 设置弹窗 ======

  function openSettings(callback) {
    dsKeyInput.value = getDeepSeekKey();
    ghTokenInput.value = getGitHubToken();
    settingsModal.style.display = 'flex';
    settingsConf.disabled = dsKeyInput.value.trim().length === 0;
    dsKeyInput.focus();

    function onConfirm() {
      var dsKey = dsKeyInput.value.trim();
      if (!dsKey) return;
      localStorage.setItem('ds_key', dsKey);
      localStorage.setItem('gh_token', ghTokenInput.value.trim());
      settingsModal.style.display = 'none';
      cleanup();
      callback(true);
    }

    function onCancel() {
      settingsModal.style.display = 'none';
      cleanup();
      callback(false);
    }

    function onInput() {
      settingsConf.disabled = dsKeyInput.value.trim().length === 0;
    }

    function onKey(e) {
      if (e.key === 'Enter' && !settingsConf.disabled) onConfirm();
      if (e.key === 'Escape') onCancel();
    }

    function cleanup() {
      settingsConf.removeEventListener('click', onConfirm);
      settingsCanc.removeEventListener('click', onCancel);
      dsKeyInput.removeEventListener('input', onInput);
      dsKeyInput.removeEventListener('keydown', onKey);
    }

    settingsConf.addEventListener('click', onConfirm);
    settingsCanc.addEventListener('click', onCancel);
    dsKeyInput.addEventListener('input', onInput);
    dsKeyInput.addEventListener('keydown', onKey);
  }

  // ====== 调用 DeepSeek API 即时生成 ======

  function generateViaDeepSeek(dsKey) {
    fabBtn.classList.add('spinning');
    showToast('🤖 正在生成新概念...');

    var seed = Math.floor(Math.random() * 99999) + 1;

    var prompt = '你是一个知识卡片生成器。请生成以下 JSON，不要包含任何其他文字：\n\n' +
      '{"ai_concepts": [{"name": "概念名", "explanation": "一句话解释（20字以内）"}, ...], ' +
      '"programming_concepts": [{"name": "概念名", "explanation": "一句话解释（20字以内）"}, ...], ' +
      '"finance_concepts": [{"name": "概念名", "explanation": "一句话解释（20字以内）"}, ...]}\n\n' +
      '严格要求：\n' +
      '- 每个分类恰好 3 个概念，共 9 个\n' +
      '- 种子 ID: ' + seed + '（根据此种子选择不同概念集合）\n' +
      '- 必须选择与之前不同的概念组合，不要重复常见的概念\n' +
      '- name 用中文，explanation 用中文且不超过 20 字\n' +
      '- 每个分类的概念要跨领域、有代表性\n' +
      '- ai: 选 AI 领域有深度的概念\n' +
      '- programming: 选计算机核心原理\n' +
      '- finance: 选经济学/金融学核心概念';

    fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + dsKey
      },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [{ role: 'user', content: prompt }],
        temperature: 1.3
      })
    })
    .then(function (res) {
      if (!res.ok) throw new Error('API 错误 (' + res.status + ')');
      return res.json();
    })
    .then(function (data) {
      var raw = data.choices[0].message.content.trim();
      if (raw.startsWith('```')) {
        raw = raw.split('\n', 1)[1].split('\n').slice(0, -1).join('\n').replace(/```$/, '').trim();
        // simpler approach
        raw = raw.replace(/^```[a-z]*\n?/i, '').replace(/```\s*$/, '').trim();
      }
      var concepts = JSON.parse(raw);

      // 校验
      if (!concepts.ai_concepts || !concepts.programming_concepts || !concepts.finance_concepts) {
        throw new Error('返回数据格式不完整');
      }

      // 立即渲染新内容
      render(concepts);

      // 缓存到 localStorage，下次打开直接显示
      localStorage.setItem('cached_concepts', JSON.stringify(concepts));
      localStorage.setItem('cached_time', Date.now());

      fabBtn.classList.remove('spinning');
      showToast('✅ 概念已更新');

      // 后台触发 GitHub 持久化
      var ghToken = getGitHubToken();
      if (ghToken) {
        triggerGitHubUpdate(ghToken);
      }
    })
    .catch(function (err) {
      fabBtn.classList.remove('spinning');
      showToast('❌ ' + err.message, 'error');
      // 如果 API 调用失败（可能是 CORS），回退到 GitHub 工作流
      var ghToken = getGitHubToken();
      if (ghToken) {
        showToast('⏳ 回退到 GitHub 工作流...');
        triggerGitHubUpdate(ghToken);
      }
    });
  }

  // ====== 触发 GitHub Actions（后台持久化）======

  function triggerGitHubUpdate(token) {
    fetch('https://api.github.com/repos/a623829/concepts-page/actions/workflows/update_data.yml/dispatches', {
      method: 'POST',
      headers: {
        'Authorization': 'token ' + token,
        'Accept': 'application/vnd.github+json',
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ ref: 'main' })
    })
    .then(function (res) {
      if (res.status === 204) {
        showToast('📤 已提交持久化保存');
      } else if (res.status === 401 || res.status === 403) {
        localStorage.removeItem('gh_token');
      }
    })
    .catch(function () {});
  }

  // ====== FAB 点击处理 ======

  fabBtn.addEventListener('click', function () {
    if (fabBtn.classList.contains('spinning')) return;

    var dsKey = getDeepSeekKey();
    if (dsKey) {
      generateViaDeepSeek(dsKey);
    } else {
      openSettings(function (saved) {
        if (saved) {
          var key = getDeepSeekKey();
          if (key) generateViaDeepSeek(key);
        }
      });
    }
  });

  // 长按 FAB 打开设置
  var pressTimer = null;
  fabBtn.addEventListener('touchstart', function (e) {
    pressTimer = setTimeout(function () {
      e.preventDefault();
      openSettings(function () {});
    }, 600);
  }, { passive: false });
  fabBtn.addEventListener('touchend', function () { clearTimeout(pressTimer); });
  fabBtn.addEventListener('touchmove', function () { clearTimeout(pressTimer); });
  fabBtn.addEventListener('mousedown', function () {
    pressTimer = setTimeout(function () {
      openSettings(function () {});
    }, 600);
  });
  fabBtn.addEventListener('mouseup', function () { clearTimeout(pressTimer); });
  fabBtn.addEventListener('mouseleave', function () { clearTimeout(pressTimer); });

  // ====== 下拉刷新（移动端）======

  (function () {
    var startY = 0;
    var pulling = false;
    var threshold = 80;
    var moved = 0;

    document.addEventListener('touchstart', function (e) {
      if (window.scrollY > 0) return;
      var t = e.touches[0];
      startY = t.clientY;
      moved = 0;
      pulling = true;
    }, { passive: true });

    document.addEventListener('touchmove', function (e) {
      if (!pulling) return;
      var t = e.touches[0];
      moved = t.clientY - startY;
      if (moved < 0) { pulling = false; pullInd.classList.remove('visible'); return; }

      if (moved > 20) {
        pullInd.classList.add('visible');
        var progress = Math.min(moved / threshold, 1);
        pullArrow.style.transform = 'rotate(' + (progress * 180) + 'deg)';
        pullArrow.className = 'arrow' + (progress >= 1 ? ' flip' : '');
        pullText.textContent = progress >= 1 ? '松开刷新' : '下拉刷新';
        pullInd.classList.remove('loading');
      }
    }, { passive: true });

    document.addEventListener('touchend', function () {
      if (!pulling) return;
      pulling = false;
      if (moved >= threshold) {
        pullInd.classList.add('loading');
        pullText.textContent = '加载中...';
        setTimeout(function () {
          pullInd.classList.remove('visible', 'loading');
          pullArrow.className = 'arrow';
          pullText.textContent = '下拉刷新';
          window.location.reload();
        }, 600);
      } else {
        pullInd.classList.remove('visible');
        pullArrow.className = 'arrow';
        pullText.textContent = '下拉刷新';
      }
    }, { passive: true });
  })();

  // ====== 数据加载 & 渲染 ======

  function loadData() {
    // 优先用缓存
    var cached = localStorage.getItem('cached_concepts');
    if (cached) {
      try {
        var d = JSON.parse(cached);
        if (d.ai_concepts && d.programming_concepts && d.finance_concepts) {
          render(d);
          return;
        }
      } catch (e) {}
    }

    // 从远程加载
    fetch('concepts.json?t=' + Date.now())
      .then(function (response) {
        if (!response.ok) throw new Error('HTTP ' + response.status);
        return response.json();
      })
      .then(function (data) {
        if (!data.ai_concepts || !data.programming_concepts || !data.finance_concepts) {
          throw new Error('数据格式不正确');
        }
        render(data);
        localStorage.setItem('cached_concepts', JSON.stringify(data));
        localStorage.setItem('cached_time', Date.now());
      })
      .catch(function (err) {
        // 如果缓存有数据但远程失败，尝试用缓存
        if (cached) {
          try {
            render(JSON.parse(cached));
            return;
          } catch (e) {}
        }
        renderError(err);
      });
  }

  function render(data) {
    var sections = [
      { title: '人工智能', key: 'ai_concepts' },
      { title: '编程',     key: 'programming_concepts' },
      { title: '金融',     key: 'finance_concepts' }
    ];

    var html = '';

    for (var s = 0; s < sections.length; s++) {
      var sec = sections[s];
      var concepts = data[sec.key];
      html += '<div class="section">';
      html += '<div class="section-title">' + sec.title + '</div>';
      html += '<div class="card-list">';

      for (var i = 0; i < concepts.length; i++) {
        var item = concepts[i];
        html +=
          '<div class="card">' +
            '<div class="card-index">' + (i + 1) + '</div>' +
            '<div class="card-body">' +
              '<div class="card-name">' + escapeHTML(item.name) + '</div>' +
              '<div class="card-explanation">' + escapeHTML(item.explanation) + '</div>' +
            '</div>' +
          '</div>';
      }

      html += '</div></div>';
    }

    contentEl.innerHTML = html;
  }

  function renderError(err) {
    var isFile = window.location.protocol === 'file:';
    var tip = '';

    if (isFile) {
      tip =
        '<p style="margin-top:16px;font-size:0.85rem;">' +
          '提示：如果你是用浏览器直接打开了这个 HTML 文件（file:// 协议），' +
          'fetch 可能被浏览器安全策略阻止。<br>' +
          '请在终端执行以下命令启动本地服务器后再访问：' +
        '</p>' +
        '<p style="margin-top:8px;"><code>cd frontend && python -m http.server 8000</code></p>' +
        '<p style="margin-top:4px;font-size:0.85rem;">然后打开 <code>http://localhost:8000</code></p>';
    }

    contentEl.innerHTML =
      '<div class="error-box">' +
        '<div class="error-icon">!</div>' +
        '<p><strong>数据加载失败</strong></p>' +
        '<p style="font-size:0.85rem;">' + escapeHTML(err.message) + '</p>' +
        tip +
      '</div>';
  }

  function escapeHTML(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  loadData();
})();
</script>

</body>
