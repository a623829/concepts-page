name: 部署到 GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - name: 上传 frontend/ 目录作为 Pages 工件
        uses: actions/upload-pages-artifact@v5
        with:
          path: frontend/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
